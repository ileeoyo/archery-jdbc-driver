name: Build and Release Archery JDBC Driver

on:
    # 手动触发
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Tag name (format: v0.2.0 or v0.2.0-beta)"
                required: true
                type: string
            release_description:
                description: "Release description"
                required: true
                default: "New release"
                type: string

    # 推送附注标签时自动触发（兼容标准版本和预发布版本）
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"      # 标准版本：v1.0.0
            - "v[0-9]+.[0-9]+.[0-9]+-*"    # 预发布版本：v1.0.0-beta

permissions:
    contents: write
    actions: read

jobs:
    # 检查和创建tag（仅手动触发时）
    check-and-create-tag:
        runs-on: ubuntu-latest
        outputs:
            should_continue: ${{ steps.check-tag.outputs.should_continue }}
            version: ${{ steps.extract-version.outputs.version }}
            tag_name: ${{ steps.extract-version.outputs.tag_name }}
            is_prerelease: ${{ steps.extract-version.outputs.is_prerelease }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Check if tag exists and validate
                id: check-tag
                run: |
                    if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      TAG_NAME="${{ github.event.inputs.tag_name }}"
                    
                      # 先验证tag格式（支持标准版本和预发布版本）
                      if ! echo "$TAG_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$'; then
                        echo "Error: Invalid tag format '$TAG_NAME'. Expected format: v0.2.0 or v0.2.0-beta"
                        echo "Please use semantic versioning format with 'v' prefix (e.g., v1.0.0, v2.1.3, v1.0.0-beta)"
                        echo "should_continue=false" >> $GITHUB_OUTPUT
                        exit 1
                      fi
                    
                      # 检查tag是否存在
                      if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
                        echo "Tag $TAG_NAME already exists"
                    
                        # 检查是否为附注标签
                        if git cat-file -t "refs/tags/$TAG_NAME" | grep -q "tag"; then
                          echo "Tag $TAG_NAME is an annotated tag, continuing workflow"
                          echo "should_continue=true" >> $GITHUB_OUTPUT
                        else
                          echo "Tag $TAG_NAME is a lightweight tag, stopping workflow"
                          echo "should_continue=false" >> $GITHUB_OUTPUT
                        fi
                      else
                        echo "Tag $TAG_NAME does not exist, creating annotated tag"
                        git config user.name "github-actions[bot]"
                        git config user.email "github-actions[bot]@users.noreply.github.com"
                        git tag -a "$TAG_NAME" -m "${{ github.event.inputs.release_description }}"
                        git push origin "$TAG_NAME"
                        echo "should_continue=true" >> $GITHUB_OUTPUT
                      fi
                    else
                      # 对于push事件，直接继续
                      echo "should_continue=true" >> $GITHUB_OUTPUT
                    fi

            -   name: Extract version from tag
                id: extract-version
                run: |
                    if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      TAG_NAME="${{ github.event.inputs.tag_name }}"
                    else
                      TAG_NAME="${{ github.ref_name }}"
                    fi
                    
                    # 输出tag名称
                    echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
                    echo "Tag name: $TAG_NAME"
                    
                    # 从tag名称提取版本号 (例如: v0.2.0 -> 0.2.0, v0.2.0-beta -> 0.2.0-beta)
                    VERSION=$(echo "$TAG_NAME" | sed -n 's/^v\([0-9]\+\.[0-9]\+\.[0-9]\+.*\)$/\1/p')
                    if [ -z "$VERSION" ]; then
                      echo "Error: Invalid tag format '$TAG_NAME'. Expected format: v0.2.0 or v0.2.0-beta"
                      echo "Please use semantic versioning format with 'v' prefix (e.g., v1.0.0, v2.1.3, v1.0.0-beta)"
                      exit 1
                    fi
                    echo "version=$VERSION" >> $GITHUB_OUTPUT
                    echo "Extracted version: $VERSION"
                    
                    # 检查是否为预发布版本
                    if echo "$TAG_NAME" | grep -q "-"; then
                      echo "is_prerelease=true" >> $GITHUB_OUTPUT
                      echo "Detected prerelease version: $TAG_NAME"
                    else
                      echo "is_prerelease=false" >> $GITHUB_OUTPUT
                      echo "Detected stable version: $TAG_NAME"
                    fi

    # 构建 Archery JDBC Driver
    build-driver:
        needs: [ check-and-create-tag ]
        if: needs.check-and-create-tag.outputs.should_continue == 'true'
        runs-on: ubuntu-latest
        outputs:
            jar-file: ${{ steps.build.outputs.jar-file }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: "17"
                    distribution: "temurin"

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4
                with:
                    cache-read-only: false

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build JDBC driver jar
                id: build
                run: |
                    ./gradlew clean jar -PdriverVersion=${{ needs.check-and-create-tag.outputs.version }}
                    # 查找生成的 Driver jar，排除源码包和文档包。
                    JAR_FILE=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -type f | sort | head -1)
                    if [ -z "$JAR_FILE" ]; then
                      echo "Error: No .jar file found in build/libs"
                      exit 1
                    fi
                    JAR_NAME=$(basename "$JAR_FILE")
                    echo "jar-file=$JAR_NAME" >> $GITHUB_OUTPUT
                    echo "JAR file: $JAR_NAME"
                    echo "Full path: $JAR_FILE"

            -   name: Upload JDBC driver artifact
                uses: actions/upload-artifact@v4
                with:
                    name: archery-jdbc-driver
                    path: build/libs/${{ steps.build.outputs.jar-file }}
                    retention-days: 1
                    if-no-files-found: error

    # 创建Release
    create-release:
        needs: [ check-and-create-tag, build-driver ]
        if: needs.check-and-create-tag.outputs.should_continue == 'true'
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Download JDBC driver artifact
                uses: actions/download-artifact@v4
                with:
                    name: archery-jdbc-driver
                    path: ./artifacts/archery-jdbc-driver

            -   name: Read changelog for current version
                id: changelog
                uses: mindsers/changelog-reader-action@v2
                with:
                    validation_level: none
                    version: ${{ needs.check-and-create-tag.outputs.version }}
                    path: ./CHANGELOG.md
                continue-on-error: true

            -   name: Get release description
                id: get-info
                run: |
                    # 优先使用从CHANGELOG.md读取的内容
                    if [ "${{ steps.changelog.outputs.changes }}" != "" ] && [ "${{ steps.changelog.outcome }}" = "success" ]; then
                      echo "Using changelog content for version ${{ needs.check-and-create-tag.outputs.version }}"
                      # 使用多行输出格式处理changelog内容
                      {
                        echo 'description<<EOF'
                        echo '${{ steps.changelog.outputs.changes }}'
                        echo 'EOF'
                      } >> $GITHUB_OUTPUT
                    else
                      echo "Changelog not found for version ${{ needs.check-and-create-tag.outputs.version }}, using fallback description"
                      # 获取release描述（原有逻辑）
                      if [ "${{ github.event_name }}" = "push" ]; then
                        # 如果是标签推送触发，获取标签的注释信息
                        TAG_NAME="${{ needs.check-and-create-tag.outputs.tag_name }}"
                        # 强制获取标签的完整信息，确保包含附注内容
                        git fetch --tags --force
                        TAG_MESSAGE=$(git tag -l --format='%(contents)' $TAG_NAME)
                        if [ -z "$TAG_MESSAGE" ]; then
                          TAG_MESSAGE="Release $TAG_NAME"
                        fi
                        {
                          echo 'description<<EOF'
                          echo "$TAG_MESSAGE"
                          echo 'EOF'
                        } >> $GITHUB_OUTPUT
                      else
                        # 如果是手动触发，使用用户输入的描述
                        {
                          echo 'description<<EOF'
                          echo '${{ github.event.inputs.release_description }}'
                          echo 'EOF'
                        } >> $GITHUB_OUTPUT
                      fi
                    fi

            -   name: Verify artifacts exist
                run: |
                    echo "Checking if artifacts exist..."
                    DRIVER_FILE="./artifacts/archery-jdbc-driver/${{ needs.build-driver.outputs.jar-file }}"
                    
                    if [ ! -f "$DRIVER_FILE" ]; then
                      echo "Error: JDBC driver jar not found: $DRIVER_FILE"
                      exit 1
                    fi
                    
                    echo "All artifacts verified successfully"
                    echo "JDBC driver: $DRIVER_FILE"

            -   name: Create Release
                id: create_release
                uses: softprops/action-gh-release@v2.3.2
                with:
                    tag_name: ${{ needs.check-and-create-tag.outputs.tag_name }}
                    name: Release ${{ needs.check-and-create-tag.outputs.tag_name }}
                    body: ${{ steps.get-info.outputs.description }}
                    draft: false
                    prerelease: ${{ needs.check-and-create-tag.outputs.is_prerelease }}
                    files: |
                        ./artifacts/archery-jdbc-driver/${{ needs.build-driver.outputs.jar-file }}

            # GitHub会自动为Release添加源代码下载链接，无需手动上传
